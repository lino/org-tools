[tools]
rust = "1.85"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.dev]
description = "Build in debug mode and run"
run = "cargo run --"

[tasks.test]
description = "Run all tests"
run = "cargo test"

[tasks.lint]
description = "Run clippy and check formatting"
run = """
cargo clippy -- -D warnings
cargo fmt -- --check
"""

[tasks.check]
description = "Run org-tools check on edge case fixtures"
run = "cargo run -- fmt check tests/fixtures/edge_cases/"

[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt"

[tasks."demo:setup"]
description = "Set up a demo environment with sample org files"
run = "bash scripts/setup-demo.sh"

[tasks.release]
description = "Bump version, commit, tag, and push to trigger release"
run = "bash scripts/release.sh {{arg(name='version', default='')}}"
